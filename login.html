<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleetly - Autentificare</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #0a0c10;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 10% 20%, rgba(58, 68, 84, 0.35) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(15, 23, 42, 0.55) 0%, transparent 60%),
                linear-gradient(rgba(10, 12, 16, 0.88), rgba(10, 12, 16, 0.88)),
                url('images/gearbox.png');
            background-size: auto, auto, auto, cover, cover;
            background-position: center, center, center, center, center;
            background-repeat: no-repeat;
            background-attachment: fixed, fixed, fixed, fixed, fixed;
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: white;
        }
        .login-box { 
            background: #151f32; 
            padding: 40px; 
            border-radius: 12px; 
            width: 320px; 
            text-align: center; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); 
            border: 1px solid #1f2d47;
        }
        .login-box h2 { 
            margin-top: 0;
            margin-bottom: 25px; 
            color: #38bdf8; 
            font-size: 26px;
            font-weight: 700;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-box input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            box-sizing: border-box; 
            background: #1f2d47; 
            border: 1px solid #314363; 
            color: white; 
            border-radius: 6px; 
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .login-box input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .login-box button { 
            width: 100%; 
            padding: 14px; 
            background: #0284c7; 
            border: none; 
            color: white; 
            font-weight: bold; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer; 
            border-radius: 6px; 
            margin-top: 15px; 
            font-size: 16px;
            transition: background 0.2s;
        }
        .login-box button:hover { 
            background: #0369a1; 
        }
        #mesajEroare {
            color: #ef4444; 
            display: none; 
            margin-top: 15px;
            font-size: 14px;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Demo Panel Styling */
        .demo-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 320px;
            height: 100vh;
            background: rgba(21, 31, 50, 0.85);
            backdrop-filter: blur(12px);
            border-left: 1px solid #1f2d47;
            box-shadow: -8px 0 24px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(100%);
            z-index: 1000;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            color: white;
            text-align: left;
        }
        .demo-panel.active {
            transform: translateX(0);
        }
        .demo-panel h3 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #38bdf8;
            font-size: 20px;
            border-bottom: 1px solid #1f2d47;
            padding-bottom: 10px;
        }
        .demo-accounts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }
        .demo-account-card {
            background: #1f2d47;
            border: 1px solid #314363;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .demo-account-card:hover {
            border-color: #38bdf8;
            background: #243552;
            transform: translateY(-2px);
        }
        .demo-account-role {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 4px;
        }
        .demo-account-role.client {
            color: #10b981;
        }
        .demo-account-user {
            font-weight: 600;
            font-size: 14px;
        }
        .demo-account-pass {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 2px;
        }
        .demo-panel-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
        }
        .demo-panel-close:hover {
            color: white;
        }
        #mesajEroareReg {
            color: #ef4444; 
            display: none; 
            margin-top: 15px;
            font-size: 14px;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        #mesajSuccesReg {
            color: #10b981; 
            display: none; 
            margin-top: 15px;
            font-size: 14px;
            background: rgba(16, 185, 129, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            text-align: left;
        }
        .toggle-form-link {
            display: block;
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s;
        }
        .toggle-form-link:hover {
            color: #38bdf8;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div id="loginBox">
            <h2>Fleetly Login</h2>
            <form id="formLogin">
                <input type="text" id="user" placeholder="Utilizator (admin sau client)" required autocomplete="off">
                <input type="password" id="pass" placeholder="Parolă" required>
                <button type="submit">Conectare</button>
            </form>
            <p id="mesajEroare">Utilizator sau parolă incorectă!</p>
            <a href="#" id="btnShowRegister" class="toggle-form-link">Nu ai cont? Înregistrează-te</a>
        </div>

        <div id="registerBox" style="display: none;">
            <h2>Creare Cont</h2>
            <form id="formRegister">
                <input type="text" id="regUser" placeholder="Nume utilizator" required autocomplete="off">
                <input type="text" id="regFullName" placeholder="Nume complet" required autocomplete="off">
                <input type="password" id="regPass" placeholder="Parolă" required>
                <input type="password" id="regConfirmPass" placeholder="Confirmă parola" required>
                <button type="submit">Înregistrare</button>
            </form>
            <p id="mesajEroareReg"></p>
            <p id="mesajSuccesReg"></p>
            <a href="#" id="btnShowLogin" class="toggle-form-link">Ai deja cont? Conectează-te</a>
        </div>
    </div>

    <script>
        // Toggle între Login și Register
        document.getElementById('btnShowRegister').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('registerBox').style.display = 'block';
            document.getElementById('mesajEroare').style.display = 'none';
        });

        document.getElementById('btnShowLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('registerBox').style.display = 'none';
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('mesajEroareReg').style.display = 'none';
            document.getElementById('mesajSuccesReg').style.display = 'none';
        });

        document.getElementById('formRegister').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('regUser').value.trim();
            const fullName = document.getElementById('regFullName').value.trim();
            const password = document.getElementById('regPass').value;
            const confirmPassword = document.getElementById('regConfirmPass').value;
            
            const errEl = document.getElementById('mesajEroareReg');
            const successEl = document.getElementById('mesajSuccesReg');
            const submitBtn = document.querySelector('#formRegister button[type="submit"]');
            
            errEl.style.display = 'none';
            successEl.style.display = 'none';

            if (password !== confirmPassword) {
                errEl.textContent = 'Parolele nu coincid!';
                errEl.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Se înregistrează...';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, fullName })
                });

                const data = await response.json();

                if (data.success) {
                    successEl.textContent = 'Cont creat cu succes! Te poți conecta acum.';
                    successEl.style.display = 'block';
                    document.getElementById('formRegister').reset();
                } else {
                    errEl.textContent = data.error || 'Eroare la crearea contului.';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = 'Eroare de rețea. Verificați conexiunea.';
                errEl.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Înregistrare';
            }
        });

        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault();

            const userIntrodus = document.getElementById('user').value.trim();
            const parolaIntrodusa = document.getElementById('pass').value;
            const errorEl = document.getElementById('mesajEroare');
            const submitBtn = document.querySelector('#formLogin button[type="submit"]');

            errorEl.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Se conectează...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userIntrodus, password: parolaIntrodusa })
                });

                const data = await response.json();

                if (data.success) {
                    // Salvăm starea sesiunii în localStorage (persistentă)
                    localStorage.setItem('statusLogat', 'da');
                    localStorage.setItem('rolUtilizator', data.rol);
                    if (data.driverId) {
                        localStorage.setItem('driverIdUtilizator', data.driverId);
                    } else {
                        localStorage.removeItem('driverIdUtilizator');
                    }

                    // Token de sesiune în sessionStorage (există DOAR în tab-ul curent).
                    sessionStorage.setItem('fleetly_session', data.rol + '_verified');

                    // Trimitem utilizatorul direct în Dashboard
                    if (data.rol === 'client') {
                        window.location.href = 'clientpanel.html';
                    } else {
                        window.location.href = 'adminpanellogpage.html';
                    }
                } else {
                    errorEl.textContent = data.error || 'Utilizator sau parolă incorectă!';
                    errorEl.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Conectare';
                }
            } catch (err) {
                errorEl.textContent = 'Eroare de rețea. Verificați conexiunea.';
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Conectare';
            }
        });

        // Funcții pentru Demo Panel (se activează doar pe localhost / 127.0.0.1)
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

        if (isLocalhost) {
            // Generăm structura HTML dinamic pentru a nu fi expusă deloc în producție
            const demoPanelHtml = `
                <div id="demoPanel" class="demo-panel">
                    <button class="demo-panel-close" onclick="toggleDemoPanel(false)">&times;</button>
                    <h3>Conturi Demo (Local)</h3>
                    <div class="demo-accounts-list">
                        <div class="demo-account-card" onclick="selectDemoAccount('admin', 'admin123')">
                            <div class="demo-account-role">Administrator</div>
                            <div class="demo-account-user">admin</div>
                            <div class="demo-account-pass">Parolă: admin123</div>
                        </div>
                        <div class="demo-account-card" onclick="selectDemoAccount('andrei', 'client123')">
                            <div class="demo-account-role client">Client (Andrei)</div>
                            <div class="demo-account-user">andrei</div>
                            <div class="demo-account-pass">Parolă: client123</div>
                        </div>
                        <div class="demo-account-card" onclick="selectDemoAccount('mihai', 'client123')">
                            <div class="demo-account-role client">Client (Mihai)</div>
                            <div class="demo-account-user">mihai</div>
                            <div class="demo-account-pass">Parolă: client123</div>
                        </div>
                        <div class="demo-account-card" onclick="selectDemoAccount('elena', 'client123')">
                            <div class="demo-account-role client">Client (Elena)</div>
                            <div class="demo-account-user">elena</div>
                            <div class="demo-account-pass">Parolă: client123</div>
                        </div>
                        <div class="demo-account-card" onclick="selectDemoAccount('alexandru', 'client123')">
                            <div class="demo-account-role client">Client (Alexandru)</div>
                            <div class="demo-account-user">alexandru</div>
                            <div class="demo-account-pass">Parolă: client123</div>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', demoPanelHtml);

            // Înregistrează evenimentul tastaturii
            window.addEventListener('keydown', function(e) {
                // Comanda Ctrl + Alt + 5
                if (e.ctrlKey && e.altKey && e.key === '5') {
                    e.preventDefault();
                    toggleDemoPanel();
                }
            });
        }

        function toggleDemoPanel(show) {
            if (!isLocalhost) return;
            const panel = document.getElementById('demoPanel');
            if (panel) {
                if (show !== undefined) {
                    if (show) panel.classList.add('active');
                    else panel.classList.remove('active');
                } else {
                    panel.classList.toggle('active');
                }
            }
        }

        function selectDemoAccount(username, password) {
            if (!isLocalhost) return;
            document.getElementById('user').value = username;
            document.getElementById('pass').value = password;
            toggleDemoPanel(false);
        }
    </script>
</body>
</html>
