<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleetly - Autentificare</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #0b111e; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: white;
        }
        .login-box { 
            background: #151f32; 
            padding: 40px; 
            border-radius: 12px; 
            width: 320px; 
            text-align: center; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); 
            border: 1px solid #1f2d47;
        }
        .login-box h2 { 
            margin-top: 0;
            margin-bottom: 25px; 
            color: #38bdf8; 
            font-size: 26px;
            font-weight: 600;
        }
        .login-box input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            box-sizing: border-box; 
            background: #1f2d47; 
            border: 1px solid #314363; 
            color: white; 
            border-radius: 6px; 
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .login-box input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .login-box button { 
            width: 100%; 
            padding: 14px; 
            background: #0284c7; 
            border: none; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 6px; 
            margin-top: 15px; 
            font-size: 16px;
            transition: background 0.2s;
        }
        .login-box button:hover { 
            background: #0369a1; 
        }
        #mesajEroare {
            color: #ef4444; 
            display: none; 
            margin-top: 15px;
            font-size: 14px;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Demo Panel Styling */
        .demo-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 320px;
            height: 100vh;
            background: rgba(21, 31, 50, 0.85);
            backdrop-filter: blur(12px);
            border-left: 1px solid #1f2d47;
            box-shadow: -8px 0 24px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(100%);
            z-index: 1000;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            color: white;
            text-align: left;
        }
        .demo-panel.active {
            transform: translateX(0);
        }
        .demo-panel h3 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #38bdf8;
            font-size: 20px;
            border-bottom: 1px solid #1f2d47;
            padding-bottom: 10px;
        }
        .demo-accounts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }
        .demo-account-card {
            background: #1f2d47;
            border: 1px solid #314363;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .demo-account-card:hover {
            border-color: #38bdf8;
            background: #243552;
            transform: translateY(-2px);
        }
        .demo-account-role {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 4px;
        }
        .demo-account-role.client {
            color: #10b981;
        }
        .demo-account-user {
            font-weight: 600;
            font-size: 14px;
        }
        .demo-account-pass {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 2px;
        }
        .demo-panel-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
        }
        .demo-panel-close:hover {
            color: white;
        }
    </style>
</head>
<body>

    <!-- Box-ul de Conectare -->
    <div class="login-box" id="loginBox">
        <h2>Fleetly Login</h2>
        <form id="formLogin">
            <input type="text" id="user" placeholder="Utilizator (admin sau client)" required autocomplete="off">
            <input type="password" id="pass" placeholder="Parolă" required>
            <button type="submit">Conectare</button>
        </form>
        <p id="mesajEroare">Utilizator sau parolă incorectă!</p>
        <div style="margin-top: 20px;">
            <a href="#" id="btnShowRegister" style="color: #38bdf8; text-decoration: none; font-size: 14px; font-weight: 500;">Nu ai cont? Înregistrează-te</a>
        </div>
    </div>

    <!-- Box-ul de Înregistrare -->
    <div class="login-box" id="registerBox" style="display: none; width: 340px;">
        <h2>Creează Cont Nou</h2>
        <form id="formRegister">
            <input type="text" id="regUser" placeholder="Nume utilizator" required autocomplete="off">
            <input type="text" id="regFullName" placeholder="Nume complet (Nume Șofer)" required autocomplete="off">
            <input type="password" id="regPass" placeholder="Parolă" required>
            <input type="password" id="regConfirmPass" placeholder="Confirmare parolă" required>
            <button type="submit">Înregistrare</button>
        </form>
        <p id="mesajEroareReg" style="color: #ef4444; display: none; margin-top: 15px; font-size: 14px; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; border: 1px solid rgba(239, 68, 68, 0.2);"></p>
        <div id="mesajSuccesReg" style="color: #10b981; display: none; margin-top: 15px; font-size: 14px; background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 6px; border: 1px solid rgba(16, 185, 129, 0.2); text-align: left; line-height: 1.5; word-break: break-all;"></div>
        <div style="margin-top: 20px;">
            <a href="#" id="btnShowLogin" style="color: #38bdf8; text-decoration: none; font-size: 14px; font-weight: 500;">Ai deja cont? Conectează-te</a>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const utilizatoriPredefiniti = [
            { username: "admin", parola: "admin123", rol: "admin" },
            { username: "andrei", parola: "client123", rol: "client", driverId: "d1" },
            { username: "mihai", parola: "client123", rol: "client", driverId: "d2" },
            { username: "elena", parola: "client123", rol: "client", driverId: "d3" },
            { username: "alexandru", parola: "client123", rol: "client", driverId: "d4" }
        ];

        // Sincronizare inițială cu baza de date
        document.addEventListener("DOMContentLoaded", async () => {
            if (window.FleetAPI) {
                try {
                    const hasApi = await FleetAPI.ping();
                    if (hasApi) {
                        const dbState = await FleetAPI.getState();
                        if (dbState && dbState.users && dbState.users.length > 0) {
                            localStorage.setItem("fleet_users", JSON.stringify(dbState.users));
                        }
                    }
                } catch (e) {
                    console.warn("Eroare la sincronizarea utilizatorilor cu API-ul la încărcare:", e);
                }
            }
        });

        // Toggle între Login și Register
        document.getElementById('btnShowRegister').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('registerBox').style.display = 'block';
            document.getElementById('mesajEroare').style.display = 'none';
        });

        document.getElementById('btnShowLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('registerBox').style.display = 'none';
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('mesajEroareReg').style.display = 'none';
            document.getElementById('mesajSuccesReg').style.display = 'none';
        });

        document.getElementById('formRegister').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('regUser').value.trim();
            const fullName = document.getElementById('regFullName').value.trim();
            const password = document.getElementById('regPass').value;
            const confirmPassword = document.getElementById('regConfirmPass').value;
            
            const errEl = document.getElementById('mesajEroareReg');
            const successEl = document.getElementById('mesajSuccesReg');
            errEl.style.display = 'none';
            successEl.style.display = 'none';

            if (password !== confirmPassword) {
                errEl.textContent = 'Parolele nu coincid!';
                errEl.style.display = 'block';
                return;
            }

            try {
                let currentUsers = [];
                let currentDrivers = [];
                let dbState = null;
                let hasApi = false;

                if (window.FleetAPI) {
                    hasApi = await FleetAPI.ping();
                    if (hasApi) {
                        dbState = await FleetAPI.getState();
                        currentUsers = dbState.users || [];
                        currentDrivers = dbState.drivers || [];
                    }
                }

                if (!hasApi) {
                    currentUsers = JSON.parse(localStorage.getItem("fleet_users")) || utilizatoriPredefiniti;
                    currentDrivers = JSON.parse(localStorage.getItem("fleet_drivers")) || [];
                }

                // Verificare dacă utilizatorul există deja
                if (currentUsers.some(u => u.username.toLowerCase() === username.toLowerCase())) {
                    errEl.textContent = 'Acest nume de utilizator este deja folosit!';
                    errEl.style.display = 'block';
                    return;
                }

                // Generare IDs
                const driverId = 'd_' + Math.random().toString(36).substr(2, 9);
                const passkey = 'key_' + Math.random().toString(36).substr(2, 10);

                // Adăugare șofer nou
                const newDriver = {
                    id: driverId,
                    name: fullName,
                    licenseCategory: 'B',
                    phone: '',
                    licenseExpiry: new Date(Date.now() + 365*10 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], // 10 ani valabilitate implicită
                    assignedCarId: ''
                };

                // Adăugare utilizator nou
                const newUser = {
                    username: username,
                    parola: password,
                    rol: 'client',
                    driverId: driverId,
                    passkey: passkey
                };

                if (hasApi && dbState) {
                    // Adăugăm în starea completă a bazei de date și salvăm
                    dbState.users.push(newUser);
                    dbState.drivers.push(newDriver);
                    await FleetAPI.saveState(dbState);
                    localStorage.setItem("fleet_users", JSON.stringify(dbState.users));
                    localStorage.setItem("fleet_drivers", JSON.stringify(dbState.drivers));
                } else {
                    // Salvăm doar local
                    currentUsers.push(newUser);
                    currentDrivers.push(newDriver);
                    localStorage.setItem("fleet_users", JSON.stringify(currentUsers));
                    localStorage.setItem("fleet_drivers", JSON.stringify(currentDrivers));
                }

                successEl.innerHTML = `
                    <strong>Cont creat cu succes!</strong><br>
                    Cheia ta unică de acces (passkey) este:<br>
                    <code style="background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-weight: bold; color: #38bdf8; font-size: 15px; display: inline-block; margin: 8px 0;">${passkey}</code><br>
                    <span style="font-size: 12px; color: #94a3b8;">Salvează cheia pentru utilizare externă sau în alți clienți.</span>
                `;
                successEl.style.display = 'block';
                document.getElementById('formRegister').reset();
            } catch (err) {
                console.error(err);
                errEl.textContent = 'Eroare la crearea contului: ' + (err.message || 'Eroare conexiune.');
                errEl.style.display = 'block';
            }
        });

        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userIntrodus = document.getElementById('user').value.trim();
            const parolaIntrodusa = document.getElementById('pass').value;

            // Dacă baza de date cu utilizatori nu există deloc, o scriem cu valorile implicite
            const localUsers = localStorage.getItem("fleet_users");
            if (!localUsers || !localUsers.includes("andrei")) {
                localStorage.setItem("fleet_users", JSON.stringify(utilizatoriPredefiniti));
            }

            // Preluăm utilizatorii din localStorage
            const bazeDateUtilizatori = JSON.parse(localStorage.getItem("fleet_users"));
            
            // Căutăm potrivirea
            const contGasit = bazeDateUtilizatori.find(u => u.username === userIntrodus && u.parola === parolaIntrodusa);

            if (contGasit) {
                // Dacă ne logăm de pe o sesiune coruptă/goală unde datele erau 0, curățăm restul tabelelor ca să forțăm app.js să le re-populeze curat
                if (!localStorage.getItem("fleet_cars") || localStorage.getItem("fleet_cars") === "[]") {
                    localStorage.removeItem("fleet_cars");
                    localStorage.removeItem("fleet_drivers");
                    localStorage.removeItem("fleet_service");
                    localStorage.removeItem("fleet_insurances");
                    localStorage.removeItem("fleet_vignettes");
                    localStorage.removeItem("fleet_tires");
                }

                // Salvăm starea sesiunii în localStorage (persistentă)
                localStorage.setItem('statusLogat', 'da');
                localStorage.setItem('rolUtilizator', contGasit.rol);
                if (contGasit.driverId) {
                    localStorage.setItem('driverIdUtilizator', contGasit.driverId);
                } else {
                    localStorage.removeItem('driverIdUtilizator');
                }

                // Token de sesiune în sessionStorage (există DOAR în tab-ul curent).
                // Dacă cineva tastează URL-ul direct într-un tab nou, acest token lipseşte
                // şi page guard-ul blochează accesul indiferent de ce e în localStorage.
                sessionStorage.setItem('fleetly_session', contGasit.rol + '_verified');
                
                // Trimitem utilizatorul direct în Dashboard
                if (contGasit.rol === 'client') {
                    window.location.href = 'clientpanel.html';
                } else {
                    window.location.href = 'adminpanellogpage.html';
                }
            } else {
                // Afișăm eroarea în caz de credențiale greșite
                document.getElementById('mesajEroare').style.display = 'block';
            }
        });

        // Funcții pentru Demo Panel (se activează doar pe localhost / 127.0.0.1)
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

        if (isLocalhost) {
            // Generăm structura HTML dinamic pentru a nu fi expusă deloc în producție
            const demoPanelHtml = `
                <div id="demoPanel" class="demo-panel">
                    <button class="demo-panel-close" onclick="toggleDemoPanel(false)">&times;</button>
                    <h3>Conturi Demo (Local)</h3>
                    <div class="demo-accounts-list">
                        <div class="demo-account-card" onclick="selectDemoAccount('admin', 'admin123')">
                            <div class="demo-account-role">Administrator</div>
                            <div class="demo-account-user">admin</div>
                            <div class="demo-account-pass">Parolă: admin123</div>
                        </div>
                        <div class="demo-account-card" onclick="selectDemoAccount('andrei', 'client123')">
                            <div class="demo-account-role client">Client (Andrei)</div>
                            <div class="demo-account-user">andrei</div>
                            <div class="demo-account-pass">Parolă: client123</div>
                        </div>
                        <div class="demo-account-card" onclick="selectDemoAccount('mihai', 'client123')">
                            <div class="demo-account-role client">Client (Mihai)</div>
                            <div class="demo-account-user">mihai</div>
                            <div class="demo-account-pass">Parolă: client123</div>
                        </div>
                        <div class="demo-account-card" onclick="selectDemoAccount('elena', 'client123')">
                            <div class="demo-account-role client">Client (Elena)</div>
                            <div class="demo-account-user">elena</div>
                            <div class="demo-account-pass">Parolă: client123</div>
                        </div>
                        <div class="demo-account-card" onclick="selectDemoAccount('alexandru', 'client123')">
                            <div class="demo-account-role client">Client (Alexandru)</div>
                            <div class="demo-account-user">alexandru</div>
                            <div class="demo-account-pass">Parolă: client123</div>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', demoPanelHtml);

            // Înregistrează evenimentul tastaturii
            window.addEventListener('keydown', function(e) {
                // Comanda Ctrl + Alt + 5
                if (e.ctrlKey && e.altKey && e.key === '5') {
                    e.preventDefault();
                    toggleDemoPanel();
                }
            });
        }

        function toggleDemoPanel(show) {
            if (!isLocalhost) return;
            const panel = document.getElementById('demoPanel');
            if (panel) {
                if (show !== undefined) {
                    if (show) panel.classList.add('active');
                    else panel.classList.remove('active');
                } else {
                    panel.classList.toggle('active');
                }
            }
        }

        function selectDemoAccount(username, password) {
            if (!isLocalhost) return;
            document.getElementById('user').value = username;
            document.getElementById('pass').value = password;
            toggleDemoPanel(false);
        }
    </script>
</body>
</html>
